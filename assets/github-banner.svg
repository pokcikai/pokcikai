<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pokcik AI — Founder and Solutions Architect at EZ OS">
  <defs>
    <!-- Base background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04060D"/>
      <stop offset="0.55" stop-color="#070B16"/>
      <stop offset="1" stop-color="#0A1122"/>
    </linearGradient>
    <!-- Cyan glow (top right) -->
    <radialGradient id="glowCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1060 60) scale(420 340)">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.20"/>
      <stop offset="0.5" stop-color="#22D3EE" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue glow (bottom left) -->
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 400) scale(460 320)">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <!-- Orb gradient -->
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1005 185) scale(150)">
      <stop offset="0" stop-color="#0E1B33"/>
      <stop offset="0.82" stop-color="#0A1426"/>
      <stop offset="0.97" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <!-- Headline gradient -->
    <linearGradient id="title" x1="80" y1="150" x2="620" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.7" stop-color="#DBEBFF"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <!-- Accent line gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#22D3EE" stroke-opacity="0.05" stroke-width="1" fill="none"/>
    </pattern>
    <!-- Soft blur for glow dots -->
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1280" height="420" rx="16" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="16" fill="url(#grid)"/>
  <rect width="1280" height="420" rx="16" fill="url(#glowCyan)"/>
  <rect width="1280" height="420" rx="16" fill="url(#glowBlue)"/>

  <!-- Network constellation (right side) -->
  <g stroke="#22D3EE" stroke-opacity="0.22" stroke-width="1">
    <line x1="905" y1="120" x2="1005" y2="185"/>
    <line x1="1005" y1="185" x2="1120" y2="110"/>
    <line x1="1005" y1="185" x2="1090" y2="280"/>
    <line x1="1090" y1="280" x2="1200" y2="230"/>
    <line x1="1120" y1="110" x2="1200" y2="230"/>
    <line x1="905" y1="120" x2="980" y2="52"/>
    <line x1="1090" y1="280" x2="1010" y2="352"/>
    <line x1="1120" y1="110" x2="1218" y2="64"/>
  </g>

  <!-- Orb -->
  <circle cx="1005" cy="185" r="150" fill="url(#orb)"/>
  <circle cx="1005" cy="185" r="150" stroke="#22D3EE" stroke-opacity="0.12"/>
  <ellipse cx="1005" cy="185" rx="150" ry="44" stroke="#22D3EE" stroke-opacity="0.10" fill="none" transform="rotate(-16 1005 185)"/>
  <ellipse cx="1005" cy="185" rx="150" ry="80" stroke="#3B82F6" stroke-opacity="0.08" fill="none" transform="rotate(-16 1005 185)"/>

  <!-- Network nodes -->
  <g fill="#22D3EE">
    <circle cx="905" cy="120" r="3.5" fill-opacity="0.9"/>
    <circle cx="1120" cy="110" r="4.5" fill-opacity="0.8"/>
    <circle cx="1090" cy="280" r="3.5" fill-opacity="0.9"/>
    <circle cx="1200" cy="230" r="3" fill-opacity="0.7"/>
    <circle cx="980" cy="52" r="2.5" fill-opacity="0.6"/>
    <circle cx="1010" cy="352" r="2.5" fill-opacity="0.6"/>
    <circle cx="1218" cy="64" r="2.5" fill-opacity="0.6"/>
  </g>
  <circle cx="1005" cy="185" r="6" fill="#22D3EE" filter="url(#soft)"/>
  <circle cx="1005" cy="185" r="3.5" fill="#A5F3FC"/>

  <!-- EZ OS logomark (text-based) -->
  <g>
    <rect x="80" y="64" width="42" height="42" rx="11" fill="url(#accent)" fill-opacity="0.14" stroke="url(#accent)" stroke-opacity="0.55"/>
    <text x="101" y="92" text-anchor="middle" font-family="'Segoe UI', 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="800" letter-spacing="0.5" fill="#67E8F9">EZ</text>
    <text x="136" y="91" font-family="'Segoe UI', 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="800" letter-spacing="2" fill="#E8F1FF">EZ OS</text>
    <text x="137" y="108" font-family="'Consolas', 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace" font-size="10" letter-spacing="3.2" fill="#5B7A9E">BUILD • LAUNCH • SCALE</text>
  </g>

  <!-- Headline -->
  <text x="78" y="196" font-family="'Segoe UI', 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-1.5" fill="url(#title)">Pokcik AI</text>
  <text x="82" y="232" font-family="'Segoe UI', 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#B9CDE4">Founder &amp; Solutions Architect @ EZ OS</text>

  <!-- Domain line -->
  <text x="82" y="268" font-family="'Consolas', 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace" font-size="14" letter-spacing="1.2" fill="#22D3EE">AI SaaS • CRM • Automation • Trading Infrastructure</text>

  <!-- Divider -->
  <rect x="82" y="292" width="56" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Stat chips -->
  <g font-family="'Segoe UI', 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">
    <rect x="82" y="314" width="222" height="34" rx="17" fill="#22D3EE" fill-opacity="0.07" stroke="#22D3EE" stroke-opacity="0.28"/>
    <circle cx="102" cy="331" r="3" fill="#22D3EE"/>
    <text x="114" y="336" fill="#D7E6F7">21+ Production Applications</text>

    <rect x="316" y="314" width="268" height="34" rx="17" fill="#3B82F6" fill-opacity="0.07" stroke="#3B82F6" stroke-opacity="0.28"/>
    <circle cx="336" cy="331" r="3" fill="#60A5FA"/>
    <text x="348" y="336" fill="#D7E6F7">Clients Across Asia, Europe &amp; Beyond</text>
  </g>

  <!-- Website -->
  <text x="1200" y="368" text-anchor="end" font-family="'Consolas', 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace" font-size="14" letter-spacing="2" fill="#67E8F9">ezos.my</text>
  <rect x="1113" y="378" width="87" height="2" rx="1" fill="url(#accent)" fill-opacity="0.6"/>

  <!-- Frame -->
  <rect x="0.5" y="0.5" width="1279" height="419" rx="15.5" stroke="#22D3EE" stroke-opacity="0.14"/>
</svg>
